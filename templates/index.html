<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Image Tool</title>
    <style>
        :root { --primary-blue: #0066ff; --background: #f3f4f6; --text-dark: #1f2937; --text-light: #6b7280; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--background); color: var(--text-dark); margin: 0; padding: 0; }
        .navbar { padding: 20px 10%; background: white; font-size: 24px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .hero-section { display: flex; justify-content: space-between; align-items: center; padding: 80px 10%; max-width: 1200px; margin: auto; flex-wrap: wrap; gap: 40px; }
        .text-content { flex: 1; min-width: 300px; }
        .text-content h1 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px; }
        .text-content p { font-size: 1.2rem; color: var(--text-light); }
        .upload-card { flex: 0.8; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; min-width: 350px; }
        
        .action-tabs { display: flex; justify-content: space-between; background: #f3f4f6; padding: 6px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e5e7eb; gap: 5px;}
        .action-tabs input[type="radio"] { display: none; } 
        .action-tabs label { flex: 1; padding: 10px 2px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 13px; font-weight: bold; color: var(--text-light); transition: 0.3s; }
        .action-tabs input[type="radio"]:checked + label { background-color: white; color: var(--primary-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .dynamic-inputs { display: none; gap: 10px; margin-bottom: 20px; }
        .dynamic-inputs input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #d1d5db; box-sizing: border-box; }

        .color-options { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; justify-content: center; }
        .color-options label { cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; color: var(--text-dark); }
        .color-options input[type="radio"] { cursor: pointer; }
        .custom-color-picker { width: 35px; height: 35px; border: none; padding: 0; cursor: pointer; border-radius: 5px; }

        .btn { background-color: var(--primary-blue); color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; display: block; box-sizing: border-box; }
        .btn:hover { background-color: #0052cc; transform: scale(1.02); }
        input[type="file"] { display: none; }
        .file-label { background-color: #e5e7eb; color: var(--text-dark); border: 2px dashed #9ca3af; margin-bottom: 15px; }
        
        #resultsSection { display: none; padding: 50px 10%; max-width: 1200px; margin: auto; text-align: center; }
        .images-grid { display: flex; justify-content: center; gap: 40px; margin-top: 30px; flex-wrap: wrap; }
        
        .img-box { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            width: 45%; 
            min-width: 300px;
            overflow: hidden; 
            position: relative;
        }
        .img-box h3 { transition: 0.3s; }
        .img-box img { 
            max-width: 100%; 
            max-height: 400px; 
            border-radius: 10px; 
            transition: transform 0.5s ease; 
            cursor: zoom-in;
        }
        .img-box:hover img { transform: scale(1.8); }
        .img-box:hover h3 { opacity: 0; }
        
        .controls { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        .btn-secondary { background-color: var(--text-light); width: auto; }
        a { text-decoration: none; }
        .footer {
        margin-top: 50px;
        padding: 20px;
        text-align: center;
        background-color: white;
        color: var(--text-light);
        border-top: 1px solid #e5e7eb;
        font-size: 14px;
    }
    .footer b {
        color: var(--primary-blue);
    }
    </style>
</head>
<body>

    <div class="navbar">✦ ImageMagic Pro</div>

    <div class="hero-section" id="heroSection">
        <div class="text-content">
            <h1>Resize, Compress, Remove BG & Colorize</h1>
            <p>100% Automatically and seamlessly. Transform your images instantly using the power of Python.</p>
        </div>

        <div class="upload-card">
            <form id="myForm">
                <div class="action-tabs">
                    <input type="radio" id="tab-remove" name="action" value="remove_bg" checked>
                    <label for="tab-remove">Remove BG</label>
                    <input type="radio" id="tab-enhance" name="action" value="enhance">
                    <label for="tab-enhance">Enhance</label>
                    <input type="radio" id="tab-resize" name="action" value="resize">
                    <label for="tab-resize">Resize</label>
                    <input type="radio" id="tab-compress" name="action" value="compress">
                    <label for="tab-compress">Compress</label>
                </div>

                <div class="color-options" id="bgBoxes">
                    <label><input type="radio" name="bg_color" value="transparent" checked> 🏁 Transparent</label>
                    <label><input type="radio" name="bg_color" value="#ffffff"> ⚪ White</label>
                    <label><input type="radio" name="bg_color" value="#000000"> ⚫ Black</label>
                    <label><input type="radio" name="bg_color" value="#0066ff"> 🔵 Blue</label>
                    <label>
                        <input type="radio" name="bg_color" id="customBgRadio" value="#ff0000"> 🎨 Custom:
                        <input type="color" id="customColorPicker" value="#ff0000" class="custom-color-picker">
                    </label>
                </div>

                <div class="dynamic-inputs" id="resizeBoxes">
                    <input type="number" name="width" placeholder="Width (px)" value="800">
                    <input type="number" name="height" placeholder="Height (px)" value="600">
                </div>

                <div class="dynamic-inputs" id="compressBoxes">
                    <input type="number" name="target_kb" placeholder="Max Size (KB) e.g. 50" value="50">
                </div>

                <label for="myFile" class="btn file-label" id="fileLabelText">📁 Choose a Photo</label>
                <input type="file" name="image" id="myFile" required>
                <button type="submit" class="btn">Upload & Process</button>
            </form>
        </div>
    </div>

    <div id="resultsSection">
        <h2 id="loadingText" style="color: var(--primary-blue);">Processing... Please wait! ⏳</h2>
        <div class="images-grid">
            <div class="img-box">
                <h3 style="color: var(--text-light);">Before</h3>
                <img id="imgBefore">
            </div>
            <div class="img-box">
                <h3 style="color: var(--text-dark);">After (Hover to Zoom)</h3>
                <div id="afterPlaceholder" style="padding: 50px; color: #999;">Result will appear here...</div>
                <img id="imgAfter" style="display: none;">
            </div>
        </div>

        <div class="controls" id="controlButtons" style="display: none;">
            <a id="downloadLink" download="processed_image.png">
                <button type="button" class="btn" style="width: auto;">Download Result</button>
            </a>
            <button type="button" class="btn btn-secondary" onclick="window.location.reload()">Upload New Photo</button>
        </div>
    </div>

    <script>
        document.getElementById('myFile').addEventListener('change', function() {
            document.getElementById('fileLabelText').innerText = "✅ " + this.files[0].name;
        });

        document.getElementById('customColorPicker').addEventListener('input', function() {
            let customRadio = document.getElementById('customBgRadio');
            customRadio.value = this.value;
            customRadio.checked = true;
        });

        const radioButtons = document.querySelectorAll('input[name="action"]');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('resizeBoxes').style.display = 'none';
                document.getElementById('compressBoxes').style.display = 'none';
                document.getElementById('bgBoxes').style.display = 'none';
                
                if (this.value === 'resize') document.getElementById('resizeBoxes').style.display = 'flex';
                else if (this.value === 'compress') document.getElementById('compressBoxes').style.display = 'flex';
                else if (this.value === 'remove_bg') document.getElementById('bgBoxes').style.display = 'flex';
            });
        });

        document.getElementById("myForm").onsubmit = function(event) {
            event.preventDefault(); 
            document.getElementById("heroSection").style.display = "none";
            document.getElementById("resultsSection").style.display = "block";
            
            let file = document.getElementById("myFile").files[0];
            document.getElementById("imgBefore").src = URL.createObjectURL(file);

            let formData = new FormData(this);
            
            // SMART URL LOGIC: Agar file system se chal raha hai toh local server use karega
            let targetUrl = window.location.protocol === 'file:' ? "http://127.0.0.1:5000/process" : "/process";
            
            fetch(targetUrl, { 
                method: "POST", 
                body: formData,
                headers: {
                    "ngrok-skip-browser-warning": "any_value" 
                }
            })
            .then(response => {
                if(!response.ok) throw new Error("Server error");
                return response.blob();
            }) 
            .then(blob => {
                let imageUrl = URL.createObjectURL(blob);
                document.getElementById("imgAfter").src = imageUrl;
                document.getElementById("afterPlaceholder").style.display = "none";
                document.getElementById("imgAfter").style.display = "block";
                document.getElementById("loadingText").innerText = "Your Image is Ready! ✨";
                
                let downloadLink = document.getElementById("downloadLink");
                downloadLink.href = imageUrl;
                let action = document.querySelector('input[name="action"]:checked').value;
                downloadLink.download = (action === 'compress') ? "compressed_image.jpg" : "processed_image.png";

                document.getElementById("controlButtons").style.display = "flex";
            })
            .catch(error => {
                alert("Error connecting to Python backend. Ensure terminal is running.");
                document.getElementById("loadingText").innerText = "An error occurred. Please try again.";
            });
        }
    </script>
    <div class="footer">
  <p>Created with ❤️ by <b> Ankit</b> </p>
    </div>
</body>
</html>
