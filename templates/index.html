<script>
        document.getElementById('myFile').addEventListener('change', function() {
            document.getElementById('fileLabelText').innerText = "✅ " + this.files[0].name;
        });

        document.getElementById('customColorPicker').addEventListener('input', function() {
            let customRadio = document.getElementById('customBgRadio');
            customRadio.value = this.value;
            customRadio.checked = true;
        });

        const radioButtons = document.querySelectorAll('input[name="action"]');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('resizeBoxes').style.display = 'none';
                document.getElementById('compressBoxes').style.display = 'none';
                document.getElementById('bgBoxes').style.display = 'none';
                
                if (this.value === 'resize') document.getElementById('resizeBoxes').style.display = 'flex';
                else if (this.value === 'compress') document.getElementById('compressBoxes').style.display = 'flex';
                else if (this.value === 'remove_bg') document.getElementById('bgBoxes').style.display = 'flex';
            });
        });

        document.getElementById("myForm").onsubmit = function(event) {
            event.preventDefault(); 
            
            // 1. Loading UI dikhana
            document.getElementById("heroSection").style.display = "none";
            document.getElementById("resultsSection").style.display = "block";
            document.getElementById("loadingText").innerText = "Processing... Please wait! ⏳";
            document.getElementById("imgAfter").style.display = "none";
            document.getElementById("afterPlaceholder").style.display = "block";
            
            let file = document.getElementById("myFile").files[0];
            document.getElementById("imgBefore").src = URL.createObjectURL(file);

            let formData = new FormData(this);
            
            // --- SMART URL DETECTION ---
            // Agar website Vercel par hai toh '/process' use karega
            // Agar laptop par local file kholi hai toh '127.0.0.1' use karega
            let targetUrl = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" 
                            ? "http://127.0.0.1:5000/process" 
                            : "/process";
            
            fetch(targetUrl, { 
                method: "POST", 
                body: formData
            })
            .then(response => {
                if(!response.ok) throw new Error("Backend Error: " + response.status);
                return response.blob();
            }) 
            .then(blob => {
                let imageUrl = URL.createObjectURL(blob);
                document.getElementById("imgAfter").src = imageUrl;
                document.getElementById("afterPlaceholder").style.display = "none";
                document.getElementById("imgAfter").style.display = "block";
                document.getElementById("loadingText").innerText = "Your Image is Ready! ✨";
                
                let downloadLink = document.getElementById("downloadLink");
                downloadLink.href = imageUrl;
                let action = document.querySelector('input[name="action"]:checked').value;
                downloadLink.download = (action === 'compress') ? "compressed_image.jpg" : "processed_image.png";

                document.getElementById("controlButtons").style.display = "flex";
            })
            .catch(error => {
                console.error("Fetch Error:", error);
                alert("Server se connect nahi ho pa raha. Check karein ki Vercel deployment complete hai ya nahi.");
                document.getElementById("loadingText").innerText = "An error occurred. Please try again.";
            });
        }
    </script>
